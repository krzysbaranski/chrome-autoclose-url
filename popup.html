<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Close URLs</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 220px;
      padding: 14px 16px;
      color: #202124;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    p { color: #5f6368; margin-bottom: 12px; line-height: 1.4; }
    button {
      width: 100%;
      padding: 7px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    #rule-count { color: #5f6368; font-size: 12px; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>Auto Close URLs</h1>
  <p id="rule-count">Loading…</p>
  <button id="options-btn">Manage Rules</button>
  <script src="popup.js"></script>
</body>
</html>
