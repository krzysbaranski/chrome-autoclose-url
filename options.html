<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Close URLs — Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <h1>Auto Close URLs</h1>
  <p class="subtitle">Define URL patterns that will be automatically closed after an optional delay.</p>

  <div id="rules-list"></div>

  <div class="add-rule">
    <h2>Add Rule</h2>
    <div class="form-row">
      <label for="new-pattern">URL Pattern</label>
      <input type="text" id="new-pattern" placeholder="https://example.com/*" />
      <span class="hint">Use <code>*</code> as a wildcard. Matches the full URL.</span>
    </div>
    <div class="form-row">
      <label for="new-delay">Delay (ms)</label>
      <input type="number" id="new-delay" value="0" min="0" step="100" />
      <span class="hint">0 = close immediately when the page finishes loading.</span>
    </div>
    <button id="add-btn">Add Rule</button>
    <span id="add-error" class="error"></span>
  </div>

  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
